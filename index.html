<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>御影会 スケジュール調整（7月12日）</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --------------------------------------------------
        // 【重要】Firebaseのコンソールから取得した設定に置き換えてください
        // --------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyC0WX-RQuayzPqtN9PlLyxrwmGN1LmsF6U",
  authDomain: "mikagekai.firebaseapp.com",
  projectId: "mikagekai",
  storageBucket: "mikagekai.firebasestorage.app",
  messagingSenderId: "537012192930",
  appId: "1:537012192930:web:f1b58311a22eb541ccf9fb",
  measurementId: "G-B5TX35Z8TV"
};

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'mikagekai_schedule');

        // 時間スロットの定義
        const slots = [
            "12:00-12:30", "12:30-13:00", "13:00-13:30", "13:30-14:00", "14:00-14:30",
            "14:30-15:00", "15:00-15:30", "15:30-16:00", "16:00-16:30", "16:30-17:00"
        ];

        const form = document.getElementById('scheduleForm');
        const tableBody = document.getElementById('attendanceBody');

        // データベースからリアルタイムにデータを取得してテーブルを描画
        onValue(dbRef, (snapshot) => {
            tableBody.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                tableBody.innerHTML = `<tr><td colspan="${slots.length + 2}" style="color:#999; padding:20px;">まだ登録はありません</td></tr>`;
                return;
            }

            // 取得したデータをループ処理してテーブルに追加
            Object.keys(data).forEach((key) => {
                const user = data[key];
                const tr = document.createElement('tr');
                
                // 名前
                const nameTd = document.createElement('td');
                nameTd.textContent = user.name;
                nameTd.style.fontWeight = 'bold';
                tr.appendChild(nameTd);
                
                // 各時間枠のステータス
                slots.forEach(slot => {
                    const td = document.createElement('td');
                    td.classList.add('status-cell');
                    if (user.times && user.times.includes(slot)) {
                        td.textContent = '○';
                        td.classList.add('status-ok');
                    } else {
                        td.textContent = '-';
                        td.classList.add('status-no');
                    }
                    tr.appendChild(td);
                });
                
                // 削除ボタン
                const actionTd = document.createElement('td');
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '削除';
                deleteBtn.classList.add('delete-btn');
                deleteBtn.onclick = () => {
                    if (confirm(`${user.name}さんのデータを削除しますか？`)) {
                        remove(ref(db, `mikagekai_schedule/${key}`));
                    }
                };
                actionTd.appendChild(deleteBtn);
                tr.appendChild(actionTd);
                
                tableBody.appendChild(tr);
            });
        });

        // フォーム送信時の処理（データ追加）
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('userName');
            const name = nameInput.value.trim();
            
            const checkedTimes = [];
            slots.forEach((slot, i) => {
                const checkbox = document.getElementById(`t${i+1}`);
                if (checkbox.checked) {
                    checkedTimes.push(slot);
                }
            });

            if (name) {
                // Firebaseにプッシュ送信
                push(dbRef, {
                    name: name,
                    times: checkedTimes
                }).then(() => {
                    // 入力フォームをクリア
                    nameInput.value = '';
                    slots.forEach((slot, i) => {
                        document.getElementById(`t${i+1}`).checked = false;
                    });
                }).catch((error) => {
                    alert("エラーが発生しました: " + error.message);
                });
            }
        });
    </script>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .date-info {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #495057;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
        }
        .time-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .time-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .time-checkbox {
            display: none;
        }
        .time-label {
            display: block;
            background: #fff;
            border: 2px solid #ced4da;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .time-checkbox:checked + .time-label {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }
        .btn-submit {
            display: block;
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #27ae60;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 15px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 12px 8px;
            text-align: center;
        }
        th {
            background-color: #f1f3f5;
            color: #495057;
        }
        .status-cell {
            font-weight: bold;
        }
        .status-ok {
            background-color: #e8f8f5;
            color: #1abc9c;
        }
        .status-no {
            background-color: #fdf2e9;
            color: #e67e22;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
        .summary-box {
            margin-top: 15px;
            background: #eaf2f8;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>御影会 スケジュール調整</h1>
    <div class="date-info">日時：7月12日(日) 12:00 ～ 17:00</div>

    <div class="form-section">
        <form id="scheduleForm">
            <div class="form-group">
                <label for="userName">お名前</label>
                <input type="text" id="userName" placeholder="例：山田 太郎" required>
            </div>
            
            <div class="form-group">
                <label>参加可能な時間帯（複数選択可）</label>
                <div class="time-grid">
                    <div><input type="checkbox" id="t1" class="time-checkbox" value="12:00-12:30"><label for="t1" class="time-label">12:00-12:30</label></div>
                    <div><input type="checkbox" id="t2" class="time-checkbox" value="12:30-13:00"><label for="t2" class="time-label">12:30-13:00</label></div>
                    <div><input type="checkbox" id="t3" class="time-checkbox" value="13:00-13:30"><label for="t3" class="time-label">13:00-13:30</label></div>
                    <div><input type="checkbox" id="t4" class="time-checkbox" value="13:30-14:00"><label for="t4" class="time-label">13:30-14:00</label></div>
                    <div><input type="checkbox" id="t5" class="time-checkbox" value="14:00-14:30"><label for="t5" class="time-label">14:00-14:30</label></div>
                    <div><input type="checkbox" id="t6" class="time-checkbox" value="14:30-15:00"><label for="t6" class="time-label">14:30-15:00</label></div>
                    <div><input type="checkbox" id="t7" class="time-checkbox" value="15:00-15:30"><label for="t7" class="time-label">15:00-15:30</label></div>
                    <div><input type="checkbox" id="t8" class="time-checkbox" value="15:30-16:00"><label for="t8" class="time-label">15:30-16:00</label></div>
                    <div><input type="checkbox" id="t9" class="time-checkbox" value="16:00-16:30"><label for="t9" class="time-label">16:00-16:30</label></div>
                    <div><input type="checkbox" id="t10" class="time-checkbox" value="16:30-17:00"><label for="t10" class="time-label">16:30-17:00</label></div>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">この時間で登録する</button>
        </form>
    </div>

    <h2>参加状況一覧</h2>
    <div class="table-responsive">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>名前</th>
                    <th>12:00<br>12:30</th>
                    <th>12:30<br>13:00</th>
                    <th>13:00<br>13:30</th>
                    <th>13:30<br>14:00</th>
                    <th>14:00<br>14:30</th>
                    <th>14:30<br>15:00</th>
                    <th>15:00<br>15:30</th>
                    <th>15:30<br>16:00</th>
                    <th>16:00<br>16:30</th>
                    <th>16:30<br>17:00</th>
                    <th>管理</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                <tr><td colspan="12" style="color:#999; padding:20px;">読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="summary-box">
        <strong>🌐 リアルタイム同期中:</strong><br>
        このページはネット上のデータベースと同期しています。誰かが登録・削除を行うと、全員の画面へリアルタイムに自動反映されます。
    </div>
</div>

</body>
</html>
