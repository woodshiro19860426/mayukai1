<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>御影会スケジューラー</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --primary-hover: #1e3d6b;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --success-color: #28a745;
            --danger-color: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, var(--primary-color), #43a047);
            color: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 24px; margin-bottom: 10px; }
        header p { font-size: 14px; opacity: 0.9; }
        .card { background-color: var(--card-bg); border-radius: 10px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card h2 { font-size: 18px; margin-bottom: 15px; border-left: 4px solid var(--primary-color); padding-left: 10px; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 120px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="time"], select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 14px; }
        button { background-color: var(--primary-color); color: white; border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: var(--primary-hover); }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background-color: #fdfdfd; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-ok { background-color: #d4edda; color: #155724; }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-ng { background-color: #f8d7da; color: #721c24; }
        .delete-btn { background-color: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 5px 10px; font-size: 12px; border-radius: 3px; cursor: pointer; }
        .delete-btn:hover { background-color: var(--danger-color); color: white; }
        .no-data { text-align: center; color: #999; padding: 30px; }
        .download-box { text-align: center; background-color: #e2e8f0; padding: 15px; border-radius: 8px; font-size: 13px; }
        .download-box button { background-color: #4a5568; width: auto; display: inline-block; padding: 8px 15px; font-size: 13px; margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>御影会調整スケジューラー</h1>
        <p>7月12日　12時から17時
各自の参加可能な時間帯を入力して「登録」を押してください</p>
    </header>

    <div class="card">
        <h2>あなたの予定を入力</h2>
        <form id="schedulerForm">
            <div class="form-group">
                <label for="name">お名前 <span style="color:red;">*</span></label>
                <input type="text" id="name" placeholder="例：山田 太郎" required>
            </div>
       
                <div class="form-group">
                    <label for="startTime">来る時間</label>
                    <input type="time" id="startTime" value="13:00">
                </div>
                <div class="form-group">
                    <label for="endTime">帰る時間</label>
                    <input type="time" id="endTime" value="18:00">
                </div>
            </div>
            <div class="form-group">
                <label for="memo">備考・連絡事項</label>
                <input type="text" id="memo" placeholder="例：15時頃に一度抜けます、二次会いけます等">
            </div>
            <button type="submit">この内容で登録する</button>
        </form>
    </div>

    <div class="card">
        <h2>現在の回答状況一覧</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>お名前</th>
                        <th>可否</th>
                        <th>参加可能時間</th>
                        <th>備考・連絡事項</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="noDataMessage" class="no-data">まだ回答はありません。最初の回答をどうぞ！</div>
        </div>
    </div>

    <div class="download-box">
        <p style="margin-bottom: 10px;">全員の入力が終わったら、管理者は以下のボタンからデータを保存（バックアップ）できます。</p>
        <button id="downloadCsv">CSV形式でデータをダウンロード</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'event_scheduler_data_2026';
    let scheduleData = [];

    function init() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            try { scheduleData = JSON.parse(savedData); } catch (e) { scheduleData = []; }
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const noData = document.getElementById('noDataMessage');
        tbody.innerHTML = '';
        if (scheduleData.length === 0) {
            noData.style.display = 'block';
            return;
        }
        noData.style.display = 'none';

        scheduleData.forEach((item, index) => {
            const tr = document.createElement('tr');
            let badgeClass = item.status === '〇' ? 'status-ok' : (item.status === '△' ? 'status-pending' : 'status-ng');
            let timeText = item.status !== '×' ? `${item.startTime} 〜 ${item.endTime}` : ' - ';

            tr.innerHTML = `
                <td style="font-weight: bold;">${escapeHtml(item.name)}</td>
                <td><span class="status-badge ${badgeClass}">${item.status}</span></td>
                <td>${timeText}</td>
                <td style="color: #555;">${escapeHtml(item.memo || '-')}</td>
                <td><button class="delete-btn" onclick="deleteItem(${index})">削除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.getElementById('schedulerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const status = document.getElementById('status').value;
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        const memo = document.getElementById('memo').value.trim();

        scheduleData.push({ name, status, startTime, endTime, memo });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
        renderTable();
        document.getElementById('name').value = '';
        document.getElementById('memo').value = '';
    });

    window.deleteItem = function(index) {
        if (confirm('この回答を削除してもよろしいですか？')) {
            scheduleData.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
            renderTable();
        }
    };

    document.getElementById('downloadCsv').addEventListener('click', function() {
        if (scheduleData.length === 0) { alert('データがありません。'); return; }
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFお名前,参加可否,開始時間,終了時間,備考\n";
        scheduleData.forEach(item => {
            csvContent += `"${item.name}","${item.status}","${item.startTime}","${item.endTime}","${item.memo}"\n`;
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "schedule.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    init();
</script>
</body>
</html>
